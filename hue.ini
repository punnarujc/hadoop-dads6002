[desktop]
  secret_key=hue_secret_key_change_this
  http_host=0.0.0.0
  http_port=8888
  time_zone=America/Los_Angeles

  [[database]]
    engine=sqlite3
    name=/usr/share/hue/desktop/desktop.db

[hadoop]
  [[hdfs_clusters]]
    [[[default]]]
      fs_defaultfs=hdfs://namenode:9000
      webhdfs_url=http://namenode:9870/webhdfs/v1

  [[yarn_clusters]]
    [[[default]]]
      submit_to=True
      resourcemanager_host=resourcemanager
      resourcemanager_port=8032
      resourcemanager_api_url=http://resourcemanager:8088
      history_server_api_url=http://historyserver:19888

[beeswax]
  hive_server_host=hive-server
  hive_server_port=10000
  hive_conf_dir=/opt/hive/conf
  server_conn_timeout=120
  thrift_version=8

[metastore]
  host=hive-metastore
  port=9083
